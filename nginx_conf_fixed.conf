# HTTP服务器 - 重定向到HTTPS
server {
    listen 80;
    server_name fsif.wzbc.edu.cn;
    
    # HTTP重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS服务器
server {
    listen 443 ssl http2;
    server_name fsif.wzbc.edu.cn;
    
    # SSL证书路径
    ssl_certificate /home/lw/projects/SSL/nginx/wzbc-edu-cn-1024225915_chain.pem;
    ssl_certificate_key /home/lw/projects/SSL/nginx/wzbc-edu-cn-1024225915_key.key;
    
    # SSL配置优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # 启用HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    
    # 网站根目录
    root /var/www/xayzb;
    index index.html index.htm;
    
    # 单页应用路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 反向代理配置 - 代理API请求到后端服务
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3002/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 代理超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 反向代理配置 - 代理内部API请求到内部代理服务
    # 保持原始路径，直接转发到内部代理服务
    location /api/ {
        proxy_pass http://10.145.251.29:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 代理超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
        
    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        internal;
    }
    
    location = /50x.html {
        internal;
    }
    
    # 禁用访问隐藏文件
    location ~ /\. {
        deny all;
    }
}