
[functions.cas-exchange-token]
enabled = true
verify_jwt = false  # 设置为 false 以避免 JWT 验证问题
import_map = "./functions/cas-exchange-token/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/cas-exchange-token/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/cas-exchange-token/*.html" ]

[functions.network-test]
enabled = true
verify_jwt = true
import_map = "./functions/network-test/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/network-test/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/network-test/*.html" ]

[functions.api-proxy]
enabled = true
verify_jwt = false
import_map = "./functions/api-proxy/deno.json"
entrypoint = "./functions/api-proxy/index.ts"
